#
# GRUB's BTRFS driver cannot reliably read compressed file extents.
# Disable per-file compression on kernel/initramfs and defragment to
# rewrite extents uncompressed so GRUB can load them.
# On non-BTRFS roots, btrfs-progs will fail silently and true ensures
# the step succeeds.
---
dontChroot: false
timeout: 300

script:
    - command: "btrfs property set -t f /boot/vmlinuz-linux compression none 2>/dev/null; btrfs filesystem defragment -czlib -f /boot/vmlinuz-linux 2>/dev/null; true"
      timeout: 60
    - command: "btrfs property set -t f /boot/initramfs-linux.img compression none 2>/dev/null; btrfs filesystem defragment -czlib -f /boot/initramfs-linux.img 2>/dev/null; true"
      timeout: 120
    - command: "btrfs property set -t f /boot/initramfs-linux-fallback.img compression none 2>/dev/null; btrfs filesystem defragment -czlib -f /boot/initramfs-linux-fallback.img 2>/dev/null; true"
      timeout: 120
